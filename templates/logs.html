<!DOCTYPE html>
<html>

<head>
    <title>System Logs</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h1>📄 System Logs</h1>

<table class="info-table">

<tr>
    <th>Date</th>
    <th>Time</th>
    <th>CPU</th>
    <th>RAM</th>
    <th>Disk</th>
    <th>Status</th>
</tr>

{% for row in logs %}

<tr>

{% for item in row %}
<td>{{ item }}</td>
{% endfor %}

</tr>

{% endfor %}

</table>

</body>

</html>
